<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecIter App</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div id="app">
    <h1>SecIter Demo</h1>
    <p>Loading...</p>
  </div>

  <!-- CDN script (permitted by CSP script-src) -->
  <script src="https://cdn.example.com/sdk/v2/bundle.js"></script>

  <!-- Analytics inline script (business requirement: cannot remove)
       TASK: add nonce="{{NONCE}}" attribute to this tag so CSP allows it.
       The server replaces {{NONCE}} with a per-request cryptographic nonce. -->
  <script>
    window.__analytics = { id: 'UA-12345-1', env: 'production' };
    (function(w, d, s) {
      var el = d.createElement(s);
      el.async = true;
      el.src = 'https://cdn.example.com/analytics/track.js';
      d.head.appendChild(el);
    })(window, document, 'script');
  </script>

  <!-- App bootstrap -->
  <script src="/js/app.js"></script>
</body>
</html>
